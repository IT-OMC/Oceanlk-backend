# Spring Cloud Run Profile
# This profile is optimized for Google Cloud Run deployments

# Use the PORT environment variable provided by Cloud Run (default 8080)
server.port=${PORT:8080}

# Logging
logging.level.root=WARN
logging.level.com.oceanlk.backend=INFO
logging.level.org.springframework.data.mongodb.core.MongoTemplate=WARN
logging.level.org.springframework.security=INFO

# Email Configuration (Production - Email enabled by default)
app.email.enabled=${EMAIL_ENABLED:true}

# Swagger / OpenAPI — DISABLED in production
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Actuator — expose health endpoint on the SAME port as the application
# Cloud Run expects health checks on http://localhost:PORT/actuator/health
management.server.port=${PORT:8080}
management.server.address=0.0.0.0
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
management.security.enabled=true

# Security
server.ssl.enabled=false

# CORS Configuration — exact production domains only
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:https://ocean.lk,https://www.ocean.lk}

# Session
server.servlet.session.timeout=30m
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

# Compression
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/css,application/javascript
server.compression.min-response-size=1024
